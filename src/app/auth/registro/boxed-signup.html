<div>
    <div class="absolute inset-0">
        <img src="/assets/images/auth/bg-gradient.png" alt="image" class="h-full w-full object-cover" />
    </div>

    <div
        class="relative flex min-h-screen items-center justify-center bg-[url(/assets/images/auth/map.png)] bg-cover bg-center bg-no-repeat px-6 py-10 dark:bg-[#060818] sm:px-16">

        <div
            class="relative w-full max-w-[870px] rounded-md bg-[linear-gradient(45deg,#fff9f9_0%,rgba(255,255,255,0)_25%,rgba(255,255,255,0)_75%,_#fff9f9_100%)] p-2 dark:bg-[linear-gradient(52.22deg,#0E1726_0%,rgba(14,23,38,0)_18.66%,rgba(14,23,38,0)_51.04%,rgba(14,23,38,0)_80.07%,#0E1726_100%)]">
            <div
                class="relative flex flex-col justify-center rounded-md bg-white/60 px-6 py-20 backdrop-blur-lg dark:bg-black/50 lg:min-h-[500px]">

                <div class="mx-auto w-full max-w-[440px]">
                    <div class="mb-10">
                        <h1 class="text-3xl font-extrabold uppercase !leading-snug text-primary md:text-4xl">Registrate
                        </h1>
                        <p class="text-base font-bold leading-normal text-white-dark">Ingresa usuario, email y
                            contraseña para registrarte</p>
                    </div>


                    <form class="space-y-5" [formGroup]="registroFormGroup" (ngSubmit)="registrarUsuario()" novalidate>
                        <div class="grid grid-cols-1 gap-5 md:grid-cols-2">

                            <div [ngClass]="isSubmitRegistro ? registroFormGroup.controls['tipoUsuario'].errors ? 'has-error'
                            : 'has-success' : ''">
                                <label for="tipoUsuario">Tipo</label>
                                <ng-select [items]="tiposUsuarios" [clearable]="false"
                                    placeholder="" class="custom-multiselect" formControlName="tipoUsuario">
                                </ng-select>
                                <ng-container *ngIf="isSubmitRegistro && !registroFormGroup.controls['tipoUsuario'].errors">
                                    <p class="mt-1 text-[#1abc9c]">¡Perfecto!</p>
                                </ng-container>
                                <ng-container *ngIf="isSubmitRegistro && registroFormGroup.controls['tipoUsuario'].errors">
                                    <p class="mt-1 text-danger">Selecciona tipo de usuario</p>
                                </ng-container>
                            </div>


                            <div [ngClass]="isSubmitRegistro ? registroFormGroup.controls['nombre'].errors ? 'has-error'
                                : 'has-success' : ''">
                                <label for=" customFname">Nombre</label>
                                <input id="customFname" type="text" placeholder="" class="form-control"
                                    formControlName="nombre" />
                                <ng-container *ngIf="isSubmitRegistro && !registroFormGroup.controls['nombre'].errors">
                                    <p class="mt-1 text-[#1abc9c]">¡Perfecto!</p>
                                </ng-container>
                                <ng-container *ngIf="isSubmitRegistro && registroFormGroup.controls['nombre'].errors">
                                    <p class="mt-1 text-danger">Ingresa nombre</p>
                                </ng-container>
                            </div>
                            <div
                                [ngClass]="isSubmitRegistro ? registroFormGroup.controls['apellido'].errors ? 'has-error' : 'has-success' : ''">
                                <label for="customLname">Apellido</label>
                                <input id="customLname" type="text" placeholder="" class="form-control"
                                    formControlName="apellido" />
                                <ng-container
                                    *ngIf="isSubmitRegistro && !registroFormGroup.controls['apellido'].errors">
                                    <p class="mt-1 text-[#1abc9c]">¡Perfecto!</p>
                                </ng-container>
                                <ng-container *ngIf="isSubmitRegistro && registroFormGroup.controls['apellido'].errors">
                                    <p class="mt-1 text-danger">Ingresa apellido</p>
                                </ng-container>
                            </div>
                            <div
                                [ngClass]="isSubmitRegistro ? registroFormGroup.controls['usuario'].errors ? 'has-error' : 'has-success' : ''">
                                <label for="customLname">Usuario</label>
                                <input id="customLname" type="text" placeholder="" class="form-control"
                                    formControlName="usuario" />
                                <ng-container *ngIf="isSubmitRegistro && !registroFormGroup.controls['usuario'].errors">
                                    <p class="mt-1 text-[#1abc9c]">¡Perfecto!</p>
                                </ng-container>
                                <ng-container *ngIf="isSubmitRegistro && registroFormGroup.controls['usuario'].errors">
                                    <p class="mt-1 text-danger">Ingresa usuario</p>
                                </ng-container>
                            </div>


                        </div>


                        <button type="submit" class="btn btn-primary !mt-6">Registrar</button>
                    </form>





                    <div class="text-center dark:text-white mt-4">
                        ¿ Ya tenes cuenta ?
                        <a routerLink="/auth/boxed-signin"
                            class="uppercase text-primary underline transition hover:text-black dark:hover:text-white">
                            INICIA SESIÓN
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
