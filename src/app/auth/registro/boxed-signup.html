<div>
    <div class="absolute inset-0">
        <img src="/assets/images/auth/bg-gradient.png" alt="image" class="h-full w-full object-cover" />
    </div>

    <div
        class="relative flex min-h-screen items-center justify-center bg-[url(/assets/images/auth/map.png)] bg-cover bg-center bg-no-repeat px-6 py-10 dark:bg-[#060818] sm:px-16">

        <div
            class="relative w-full max-w-[870px] rounded-md bg-[linear-gradient(45deg,#fff9f9_0%,rgba(255,255,255,0)_25%,rgba(255,255,255,0)_75%,_#fff9f9_100%)] p-2 dark:bg-[linear-gradient(52.22deg,#0E1726_0%,rgba(14,23,38,0)_18.66%,rgba(14,23,38,0)_51.04%,rgba(14,23,38,0)_80.07%,#0E1726_100%)]">
            <div
                class="relative flex flex-col justify-center rounded-md bg-white/60 px-6 py-20 backdrop-blur-lg dark:bg-black/50 lg:min-h-[500px]">

                <div class="mx-auto w-full max-w-[1000px]">
                    <div class="mb-10">
                        <h1 class="text-3xl font-extrabold uppercase !leading-snug text-primary md:text-4xl">Registrate
                        </h1>
                        <p class="text-base font-bold leading-normal text-white-dark">Completá los campos obligatorios
                            (*)</p>
                    </div>


                    <form class="space-y-5" [formGroup]="registroFormGroup" (ngSubmit)="registrarUsuario()" novalidate>
                        <div class="grid grid-cols-1 gap-3 md:grid-cols-2">

                            <div [ngClass]="isSubmitRegistro ? registroFormGroup.controls['nombre'].errors ? 'has-error'
                                : 'has-success' : ''">
                                <label for=" customFname">Nombre completo*</label>
                                <input id="customFname" type="text" placeholder="" class="form-control"
                                    formControlName="nombre" />
                            </div>

                            <div
                                [ngClass]="isSubmitRegistro ? registroFormGroup.controls['posicion'].errors ? 'has-error' : 'has-success' : ''">
                                <label for="posicion">Posición*</label>
                                <ng-select [items]="posiciones" bindLabel="nombre" bindValue="id"
                                    formControlName="posicion"
                                    [ngClass]="isSubmitRegistro ? registroFormGroup.controls['posicion'].errors ? 'has-error' : 'has-success' : ''">
                                </ng-select>
                            </div>

                            @if (mostrarOrganizacion) {
                            <div
                                [ngClass]="isSubmitRegistro ? registroFormGroup.controls['organizacion'].errors ? 'has-error' : 'has-success' : ''">
                                <label for="organizacion">Organización *</label>
                                <input id="organizacion" type="text"
                                    placeholder="Organización o institución a la que pertenece" class="form-control"
                                    formControlName="organizacion" />
                            </div>
                            }

                            <div
                                [ngClass]="isSubmitRegistro ? registroFormGroup.controls['celular'].errors ? 'has-error' : 'has-success' : ''">
                                <label for="celular">Celular *</label>
                                <input id="celular" type="text" placeholder="" class="form-control"
                                    formControlName="celular" />
                            </div>

                            <div
                                [ngClass]="isSubmitRegistro ? registroFormGroup.controls['email'].errors ? 'has-error' : 'has-success' : ''">
                                <label for="email">Email *</label>
                                <input id="email" type="text" placeholder="" class="form-control"
                                    formControlName="email" />
                            </div>

                            <div
                                [ngClass]="isSubmitRegistro ? registroFormGroup.controls['password'].errors ? 'has-error' : 'has-success' : ''">
                                <label>Contraseña *</label>
                                <div class="input-group">
                                    <input [type]="showPassword ? 'text' : 'password'" class="form-control"
                                        formControlName="password">
                                    <fa-icon [icon]="showPassword ? iconEyeSlash : iconEye" class="input-group-text"
                                        style="cursor: pointer;" (click)="togglePassword()"></fa-icon>
                                </div>
                            </div>

                            <div
                                [ngClass]="isSubmitRegistro ? registroFormGroup.controls['confirmPassword'].errors ? 'has-error' : 'has-success' : ''">
                                <label>Confirmar contraseña *</label>
                                <div class="input-group">
                                    <input [type]="showConfirmPassword ? 'text' : 'password'" class="form-control"
                                        formControlName="confirmPassword">
                                    <fa-icon [icon]="showConfirmPassword ? iconEyeSlash : iconEye"
                                        class="input-group-text" style="cursor: pointer;"
                                        (click)="toggleConfirmPassword()"></fa-icon>
                                </div>
                            </div>


                        </div>

                        <button type="submit" class="btn btn-primary !mt-6 w-full">Registrar</button>

                    </form>





                    <div class="text-center dark:text-white mt-4">
                        ¿ Ya tenes cuenta ?
                        <a routerLink="/auth/boxed-signin"
                            class="uppercase text-primary underline transition hover:text-black dark:hover:text-white">
                            INICIA SESIÓN
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<ngx-spinner bdColor="rgba(0, 0, 0, 0.8)" size="large" color="#fff" type="ball-scale-multiple" [fullScreen]="true">
    <p style="color: white"> Cargando... </p>
</ngx-spinner>
