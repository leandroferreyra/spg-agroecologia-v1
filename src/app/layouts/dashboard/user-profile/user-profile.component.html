@if (dataLoaded) {
<form [formGroup]="userForm"
    class="mb-5 rounded-md border border-[#ebedf2] bg-white p-4 dark:border-[#191e3a] dark:bg-[#0e1726]">

    <div class="flex items-center justify-between mb-4">
        <div>
            <h6 class="text-lg font-bold">Mi perfil</h6>
        </div>

        <div class="flex items-center">
            <div class="ltr:mr-4 rtl:ml-4">
                <button type="button" ngxTippy="Editar datos" class="hover:text-primary" (click)="toggleEdicion()">
                    <icon-edit class="h-6 w-6" />
                </button>
            </div>
            <div class="ltr:mr-4 rtl:ml-4">
                <button type="button" ngxTippy="Cambiar clave" class="hover:text-primary">
                    <icon-lock class="h-6 w-6" />
                </button>
            </div>
            <div class="ltr:mr-4 rtl:ml-4">
                <button type="button" ngxTippy="Cambiar rol" class="hover:text-primary">
                    <icon-refresh class="h-6 w-6" />
                </button>
            </div>
        </div>
    </div>



    <div class="flex flex-col sm:flex-row">
        <div class="grid flex-1 grid-cols-1 gap-5 sm:grid-cols-2">
            <div>
                <label for="email">Email</label>
                <input id="email" type="email" placeholder="Email" class="form-control" formControlName="email" />
            </div>
            <div>
                <label for="usuario">Usuario</label>
                <input id="usuario" type="text" placeholder="New York" class="form-control" formControlName="usuario" />
            </div>
            <div>
                <label for="nombres">Nombres</label>
                <input id="nombres" type="text" placeholder="" class="form-control" formControlName="nombres" />
            </div>
            <div>
                <label for="apelliddos">Apellidos</label>
                <input id="apelliddos" type="text" placeholder="" class="form-control" formControlName="apellidos" />
            </div>
            <div>
                <label>Género</label>
                <ng-select [items]="generos" bindLabel="name" bindValue="uuid" formControlName="genero"
                    [virtualScroll]="true">
                </ng-select>
            </div>
            <div>
                <label>País</label>
                <ng-select [items]="paises" bindLabel="name" bindValue="uuid" formControlName="pais"
                    [virtualScroll]="true">
                </ng-select>
            </div>
            <div>
                <label>Provincia</label>
                <ng-select [items]="provincias" bindLabel="name" bindValue="uuid" formControlName="provincia"
                    [virtualScroll]="true">
                </ng-select>
            </div>
            <div>
                <label>Ciudad</label>
                <ng-select [items]="ciudades" bindLabel="name" bindValue="uuid" formControlName="ciudad"
                    [virtualScroll]="true">
                </ng-select>
            </div>
            <div>
                <label for="calle">Calle</label>
                <input id="calle" type="text" placeholder="" class="form-control" formControlName="direccionCalle" />
            </div>
            <div>
                <label for="numero">Número</label>
                <input id="numero" type="text" placeholder="" class="form-control" formControlName="direccionNumero" />
            </div>
            <div>
                <label for="numero">Detalle de la dirección</label>
                <input id="numero" type="text" placeholder="" class="form-control" formControlName="direccionDetalle" />
            </div>

            <!-- <div>
                <label class="inline-flex cursor-pointer">
                    <input type="checkbox" class="form-checkbox" />
                    <span class="relative text-white-dark checked:bg-none">Roles</span>
                </label>
            </div> -->

        </div>
    </div>

    @if (isEdicion) {
    <div class="row mt-3">
        <div class="col-12 d-flex justify-content-center">
            <button type="button" class="btn btn-wd btn-primary mr-4" (click)="confirmarEdicion()">Confirmar</button>
            <button id="back-button-with-border" type="button" class="btn btn-wd"
                (click)="cancelarEdicion()">Cancelar</button>
        </div>
    </div>
    }


</form>
}

<ngx-spinner bdColor="rgba(0, 0, 0, 0.8)" size="large" color="#fff" type="ball-scale-multiple" [fullScreen]="true">
    <p style="color: white"> Cargando... </p>
</ngx-spinner>
