@if (dataLoaded) {
<form [formGroup]="userForm" (keydown.enter)="confirmarEdicion()"
    class="mb-5 rounded-md border border-[#ebedf2] bg-white p-4 dark:border-[#191e3a] dark:bg-[#0e1726]">

    <div class="flex items-center justify-between mb-4">
        <div>
            <h6 class="text-lg font-bold">Mi perfil</h6>
        </div>

        <div class="flex items-center">
            <div class="ltr:mr-4 rtl:ml-4">
                <button type="button" ngxTippy="Editar datos" class="hover:text-primary" (click)="toggleEdicion()">
                    <icon-edit class="h-6 w-6" />
                </button>
            </div>
            <div class="ltr:mr-4 rtl:ml-4">
                <button type="button" ngxTippy="Cambiar clave" class="hover:text-primary"
                    (click)="openModalCambiarClave()">
                    <icon-lock class="h-6 w-6" />
                </button>
            </div>
            @if (usuarioLogueado.roles.length > 1) {
            <div class="ltr:mr-4 rtl:ml-4">
                <button type="button" ngxTippy="Cambiar rol" class="hover:text-primary" (click)="openModalCambiarRol()">
                    <icon-refresh class="h-6 w-6" />
                </button>
            </div>
            }
        </div>
    </div>



    <div class="flex flex-col sm:flex-row">
        <div class="grid flex-1 grid-cols-1 gap-5 sm:grid-cols-2">
            <div>
                <label for="email">Email</label>
                <input id="email" type="email" placeholder="Email" class="form-control" formControlName="email" />
            </div>
            <div>
                <label for="usuario">Usuario</label>
                <input id="usuario" type="text" placeholder="New York" class="form-control" formControlName="usuario" />
            </div>
            <div>
                <label for="nombres">Nombres</label>
                <input id="nombres" type="text" placeholder="" class="form-control" formControlName="nombres" />
            </div>
            <div>
                <label for="apelliddos">Apellidos</label>
                <input id="apelliddos" type="text" placeholder="" class="form-control" formControlName="apellidos" />
            </div>
            <div>
                <label>Género</label>
                <ng-select [items]="generos" bindLabel="name" bindValue="uuid" formControlName="genero"
                    [virtualScroll]="true">
                </ng-select>
            </div>
            <div>
                <label>País</label>
                <ng-select [items]="paises" bindLabel="name" bindValue="uuid" formControlName="pais"
                    [virtualScroll]="true">
                </ng-select>
            </div>
            <div>
                <label>Provincia</label>
                <ng-select [items]="provincias" bindLabel="name" bindValue="uuid" formControlName="provincia"
                    [virtualScroll]="true">
                </ng-select>
            </div>
            <div>
                <label>Ciudad</label>
                <ng-select [items]="ciudades" bindLabel="name" bindValue="uuid" formControlName="ciudad"
                    [virtualScroll]="true">
                </ng-select>
            </div>
            <div>
                <label for="calle">Calle</label>
                <input id="calle" type="text" placeholder="" class="form-control" formControlName="direccionCalle" />
            </div>
            <div>
                <label for="numero">Número</label>
                <input id="numero" type="text" placeholder="" class="form-control" formControlName="direccionNumero" />
            </div>
            <div>
                <label for="numero">Detalle de la dirección</label>
                <input id="numero" type="text" placeholder="" class="form-control" formControlName="direccionDetalle" />
            </div>

            <!-- <div>
                <label class="inline-flex cursor-pointer">
                    <input type="checkbox" class="form-checkbox" />
                    <span class="relative text-white-dark checked:bg-none">Roles</span>
                </label>
            </div> -->

        </div>
    </div>

    @if (isEdicion) {
    <div class="row mt-3">
        <div class="col-12 d-flex justify-content-center">
            <button type="button" class="btn btn-wd btn-primary mr-4" (click)="confirmarEdicion()">Confirmar</button>
            <button id="back-button-with-border" type="button" class="btn btn-wd"
                (click)="cancelarEdicion()">Cancelar</button>
        </div>
    </div>
    }


</form>
}

<ngx-spinner bdColor="rgba(51,51,51,0.8)" size="medium" color="#fff" type="ball-spin-fade">
    <p style="font-size: 20px; color: white">Cargando</p>
</ngx-spinner>


<div>
    <ngx-custom-modal #modalCambioRol class="modal-top extra-large-modal animate animate-fade-in">

        <ng-template #modalHeader>
            <h5 class="text-lg font-semibold dark:text-white-light">Cambiar de rol</h5>
        </ng-template>

        <ng-template #modalBody>
            <div class="container d-flex flex-column justify-content-between">
                <div class="row justify-content-center flex-grow-1 align-items-center mt-5 mb-5">

                    <div class="col-md-12 flex flex-wrap justify-center text-center gap-3">
                        @for(rol of usuarioLogueado.roles; track rol) {
                        @if (rol != actual_role) {
                        <div class="flex">
                            <button class="btn btn-wd btn-primary m-2 text-xl" (click)="ingresarAlDashboard(rol)">
                                {{ rol }}
                            </button>
                        </div>
                        }
                        }
                    </div>



                </div>

                <div class="row mt-3">
                    <div class="col-12 d-flex justify-content-center">
                        <button id="back-button-with-border" type="button" class="btn btn-wd"
                            (click)="closeModalCambioRol()">Cancelar</button>
                    </div>
                </div>
            </div>
        </ng-template>
    </ngx-custom-modal>
</div>




<div>
    <ngx-custom-modal #modalCambioClave class="modal-top animate animate-fade-in">
        <ng-template #modalHeader>
            <h5 class="text-lg font-semibold dark:text-white-light">Modificar clave</h5>
        </ng-template>

        <ng-template #modalBody>
            <div class="container">
                <div class="row justify-content-center">

                    <div class="col-md-12">
                        <form [formGroup]="changePasswordForm" (keydown.enter)="confirmarCambioClave()">

                            <div
                                [ngClass]="isSubmitChangePassword ? changePasswordForm.controls['password'].errors ? 'has-error' : 'has-success' : ''">
                                <label>Clave actual</label>
                                <div class="input-group">
                                    <input [type]="showPassword ? 'text' : 'password'" class="form-control"
                                        formControlName="password">
                                    <fa-icon [icon]="showPassword ? iconEyeSlash : iconEye" class="input-group-text"
                                        style="cursor: pointer;" (click)="togglePassword()"></fa-icon>
                                </div>
                                <!-- <ng-container
                                    *ngIf="isSubmitChangePassword && !changePasswordForm.controls['password'].errors">
                                    <p class="mt-1 text-[#1abc9c]">¡Perfecto!</p>
                                </ng-container>
                                <ng-container
                                    *ngIf="isSubmitChangePassword && changePasswordForm.controls['password'].errors">
                                    <p class="mt-1 text-danger">Ingresa clave actual</p>
                                </ng-container> -->
                            </div>

                            <div
                                [ngClass]="isSubmitChangePassword ? changePasswordForm.controls['newPassword'].errors ? 'has-error' : 'has-success' : ''">
                                <label>Clave nueva</label>
                                <div class="input-group">
                                    <input [type]="showNewPassword ? 'text' : 'password'" class="form-control"
                                        formControlName="newPassword">
                                    <fa-icon [icon]="showNewPassword ? iconEyeSlash : iconEye" class="input-group-text"
                                        style="cursor: pointer;" (click)="toggleNewPassword()"></fa-icon>
                                </div>
                                <!-- <ng-container
                                    *ngIf="isSubmitChangePassword && !changePasswordForm.controls['newPassword'].errors">
                                    <p class="mt-1 text-[#1abc9c]">¡Perfecto!</p>
                                </ng-container>
                                <ng-container
                                    *ngIf="isSubmitChangePassword && changePasswordForm.controls['newPassword'].errors">
                                    <p class="mt-1 text-danger">Ingresa clave nueva</p>
                                </ng-container> -->
                            </div>

                            <div
                                [ngClass]="isSubmitChangePassword ? changePasswordForm.controls['confirmPassword'].errors ? 'has-error' : 'has-success' : ''">
                                <label>Repetir clave nueva</label>
                                <div class="input-group">
                                    <input [type]="showNewConfirmPassword ? 'text' : 'password'" class="form-control"
                                        formControlName="confirmPassword">
                                    <fa-icon [icon]="showNewConfirmPassword ? iconEyeSlash : iconEye"
                                        class="input-group-text" style="cursor: pointer;"
                                        (click)="toggleConfirmNewPassword()"></fa-icon>
                                </div>
                                <!-- <ng-container
                                    *ngIf="isSubmitChangePassword && !changePasswordForm.controls['confirmPassword'].errors">
                                    <p class="mt-1 text-[#1abc9c]">¡Perfecto!</p>
                                </ng-container>
                                <ng-container
                                    *ngIf="isSubmitChangePassword && changePasswordForm.controls['confirmPassword'].errors">
                                    <p class="mt-1 text-danger">Ingresa confirmación de clave nueva</p>
                                </ng-container> -->
                            </div>

                            <div class="row mt-3">
                                <div class="col-12 d-flex justify-content-center">
                                    <button type="button" class="btn btn-wd btn-primary mr-4"
                                        (click)="confirmarCambioClave()">Confirmar</button>
                                    <button id="back-button-with-border" type="button" class="btn btn-wd"
                                        (click)="closeModalCambioClave()">Cancelar</button>
                                </div>
                            </div>

                        </form>
                    </div>

                </div>
            </div>
        </ng-template>
    </ngx-custom-modal>
</div>
