<div class="container mt-4">
    <!-- Datos de Contacto -->
    <div class="card position-relative mb-4">
        <div class="card-header bg-white border-bottom d-flex justify-content-between align-items-center">
            <h5 class="mb-0">Datos de Contacto</h5>
            <button type="button" class="ltr:mr-3 rtl:ml-2" ngxTippy="Editar datos de contacto">
                <icon-pencil />
            </button>
        </div>
        <div class="card-body">
            <div class="row g-3">
                <div class="col-md-6">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" id="email" class="form-control">
                </div>
                <div class="col-md-6">
                    <label for="telefono" class="form-label">Teléfono</label>
                    <input type="text" id="telefono" class="form-control">
                </div>
                <div class="col-md-6">
                    <label for="web" class="form-label">Sitio Web</label>
                    <input type="url" id="web" class="form-control">
                </div>
            </div>
        </div>
    </div>

    <!-- Datos de Persona de Contacto -->
    <div class="card position-relative">
        <div class="card-header bg-white border-bottom d-flex justify-content-between align-items-center">
            <h5 class="mb-0">Datos de Persona de Contacto</h5>
            <button type="button" class="ltr:mr-3 rtl:ml-2" ngxTippy="Editar datos de persona de contacto">
                <icon-pencil />
            </button>
        </div>
        <div class="card-body">
            <div class="row g-3">
                <div class="col-md-6">
                    <label for="nombre" class="form-label">Nombre</label>
                    <input type="text" id="nombre" class="form-control">
                </div>
                <div class="col-md-6">
                    <label for="apellido" class="form-label">Apellido</label>
                    <input type="text" id="apellido" class="form-control">
                </div>
                <div class="col-md-6">
                    <label for="telefonoContacto" class="form-label">Teléfono</label>
                    <input type="text" id="telefonoContacto" class="form-control">
                </div>
                <div class="col-md-6">
                    <label for="emailContacto" class="form-label">Email</label>
                    <input type="email" id="emailContacto" class="form-control">
                </div>
            </div>
        </div>
    </div>
</div>
