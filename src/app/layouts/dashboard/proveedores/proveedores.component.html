<div>
    <div class="relative flex h-full gap-5 sm:h-[calc(100vh_-_150px)]">
        <div class="overlay absolute z-[5] hidden h-full w-full rounded-md bg-black/60"
            [ngClass]="{ '!block xl:!hidden': isShowMailMenu }" (click)="isShowMailMenu = !isShowMailMenu"></div>

        <div class="panel dark:gray-50 absolute z-10 hidden h-full w-[250px] max-w-full flex-none space-y-3 overflow-hidden p-4 ltr:rounded-r-none rtl:rounded-l-none xl:relative xl:block xl:h-auto ltr:xl:rounded-r-md rtl:xl:rounded-l-md"
            [ngClass]="{ '!block': isShowMailMenu }">

            <!-- PANEL IZQUIERDO -->

            <div class="flex h-full flex-col pb-16">
                <div class="pb-5">
                    <button class="btn btn-primary w-full" type="button" (click)="agregarProveedor()">Agregar
                        proveedor</button>
                </div>

                <ng-scrollbar class="relative h-full grow" appearance="compact">
                    <div class="table-responsive">
                        <table class="table-hover">
                            <tbody>
                                @for(data of proveedores ; track data.uuid) {
                                <tr (click)="showDataProveedor(data)">
                                    <td class="whitespace-nowrap" style="cursor: pointer;">{{ getName(data) }} </td>
                                </tr>
                                }
                            </tbody>
                        </table>
                    </div>
                </ng-scrollbar>

                <div class="absolute bottom-0 mp-2 w-full p-4 ltr:left-0 rtl:right-0">
                    <div class="group relative">
                        <input type="text" placeholder="Buscar proveedor..."
                            class="peer form-input ltr:pr-8 rtl:pl-8" />
                        <div
                            class="absolute top-1/2 -translate-y-1/2 peer-focus:text-primary ltr:right-[11px] rtl:left-[11px]">
                            <icon-search />
                        </div>
                    </div>
                    <div class="form-check form-check-inline flex" style="margin-top:10px">
                        <label class="form-check-label flex gap-1">
                            <input class="form-checkbox h-5 w-5" type="checkbox" [checked]="busqueda_contiene"
                                [(ngModel)]="busqueda_contiene">
                            <span class="form-check-sign">Contiene</span>
                        </label>
                    </div>
                </div>
            </div>
        </div>

        <!-- PANEL DERECHO -->
        <div class="panel h-full flex-1 overflow-x-hidden p-0">

            <!-- <h5 class="mt-3 text-lg font-semibold dark:text-white-light min-w-0">Proveedores</h5> -->

            <!-- MENU ICONO OCULTO RESPONSIVE -->
            <div class="flex flex-wrap-reverse items-center justify-between gap-4 p-4">
                <h5 class="text-lg font-semibold dark:text-white-light min-w-0 flex items-center gap-2">
                    Proveedores
                    <button type="button" ngxTippy="Editar datos" class="hover:text-primary flex items-center"
                        (click)="toggleEdicion()">
                        <icon-edit class="h-6 w-6" />
                    </button>
                </h5>

                <div class="flex w-full items-center justify-between sm:w-auto">
                    <div class="flex items-center ltr:mr-4 rtl:ml-4">
                        <button type="button" class="block hover:text-primary ltr:mr-3 rtl:ml-3 xl:hidden"
                            (click)="isShowMailMenu = !isShowMailMenu">
                            <icon-menu />
                        </button>
                    </div>
                </div>
            </div>


            <!-- BORDER -->
            <div class="h-px border-b border-[#e0e6ed] dark:border-[#1b2e4b]"></div>

            <!-- TABS -->
            <div class="mb-5">
                <div class="mt-3 mb-5 flex flex-wrap">
                    <a href="javascript:;"
                        class="flex items-center border-t-2 border-transparent bg-[#f6f7f8] p-7 py-3 !outline-none transition duration-300 hover:border-secondary hover:text-secondary dark:bg-transparent dark:hover:bg-[#191e3a]"
                        [ngClass]="{ '!border-secondary text-secondary dark:bg-[#191e3a]': tab1.toLowerCase() === 'datos generales' }"
                        (click)="tab1 = 'datos generales'">
                        <icon-user class="mr-3" />
                        Datos generales
                    </a>

                    <a href="javascript:;"
                        class="flex items-center border-t-2 border-transparent bg-[#f6f7f8] p-7 py-3 !outline-none transition duration-300 hover:border-secondary hover:text-secondary dark:bg-transparent dark:hover:bg-[#191e3a]"
                        [ngClass]="{ '!border-secondary text-secondary dark:bg-[#191e3a]': tab1.toLowerCase() === 'cuentas bancarias' }"
                        (click)="tab1 = 'cuentas bancarias'">

                        Cuentas bancarias
                    </a>

                    <a href="javascript:;"
                        class="flex items-center border-t-2 border-transparent bg-[#f6f7f8] p-7 py-3 !outline-none transition duration-300 hover:border-secondary hover:text-secondary dark:bg-transparent dark:hover:bg-[#191e3a]"
                        [ngClass]="{ '!border-secondary text-secondary dark:bg-[#191e3a]': tab1.toLowerCase() === 'compras' }"
                        (click)="tab1 = 'compras'">
                        Compras
                    </a>
                </div>

                <div class="flex-1 text-sm">
                    <div *ngIf="tab1.toLowerCase() === 'datos generales'">
                        <!-- <h4 class="mb-4 text-2xl font-semibold"></h4> -->
                        <form [formGroup]="proveedorForm" class="p-4">
                            <div class="flex flex-col sm:flex-row">
                                <div class="grid flex-1 grid-cols-1 gap-5 sm:grid-cols-2">
                                    @if (isHuman) {
                                    <div>
                                        <label for="nombre">Nombre</label>
                                        <input id="nombre" type="text" placeholder="" class="form-control"
                                            formControlName="nombre" />
                                    </div>
                                    <div>
                                        <label for="apellido">Apellido</label>
                                        <input id="apellido" type="text" placeholder="" class="form-control"
                                            formControlName="apellido" />
                                    </div>
                                    <div>
                                        <label for="documento">Documento</label>
                                        <input id="documento" type="text" placeholder="" class="form-control"
                                            formControlName="documento" />
                                    </div>
                                    } @else {
                                    <div>
                                        <label for="razon">Razón social</label>
                                        <input id="razon" type="text" placeholder="" class="form-control"
                                            formControlName="razon" />
                                    </div>
                                    }
                                    <div>
                                        <label for="cuit">Cuit</label>
                                        <input id="cuit" type="text" placeholder="" class="form-control"
                                            formControlName="cuit" />
                                    </div>
                                    <div>
                                        <label for="sigla">Sigla</label>
                                        <input id="sigla" type="text" placeholder="" class="form-control"
                                            formControlName="sigla" />
                                    </div>
                                    <div>
                                        <label for="calle">Calle</label>
                                        <input id="calle" type="text" placeholder="" class="form-control"
                                            formControlName="calle" />
                                    </div>
                                    <div>
                                        <label for="numero">Número</label>
                                        <input id="numero" type="text" placeholder="" class="form-control"
                                            formControlName="numero" />
                                    </div>
                                    <div>
                                        <label for="comentarios">Comentarios</label>
                                        <textarea class="form-control" id="comentarios" formControlName="comentarios"
                                            rows="3"></textarea>
                                    </div>
                                </div>
                            </div>

                            @if (isEdicion) {
                            <div class="row mt-3">
                                <div class="col-12 d-flex justify-content-center">
                                    <button type="button" class="btn btn-wd btn-primary mr-4"
                                        (click)="confirmarEdicion()">Confirmar</button>
                                    <button id="back-button-with-border" type="button" class="btn btn-wd"
                                        (click)="cancelarEdicion()">Cancelar</button>
                                </div>
                            </div>
                            }

                        </form>

                    </div>

                    <div *ngIf="tab1.toLowerCase() === 'cuentas bancarias'">

                    </div>

                    <div *ngIf="tab1.toLowerCase() === 'compras'">

                    </div>

                </div>
            </div>

        </div>

    </div>
</div>
