<div [ngClass]="{ 'dark text-white-dark': store.semidark }">
    <nav
        class="sidebar fixed bottom-0 top-0 z-50 h-full min-h-screen w-[260px] shadow-[5px_0_25px_0_rgba(94,92,154,0.1)] transition-all duration-300">
        <div class="h-full bg-white dark:bg-[#0e1726]">
            <div class="flex items-center justify-between px-4 py-3">
                <a routerLink="/" class="main-logo flex shrink-0 items-center">
                    <img class="ml-[5px] w-8 flex-none" src="/assets/images/ladie-logo.png" alt=""
                        style="height: 20px; width: 120px;" />
                </a>
                <a class="collapse-icon flex h-8 w-8 items-center rounded-full transition duration-300 hover:bg-gray-500/10 hover:text-primary dark:text-white-light dark:hover:bg-dark-light/10 rtl:rotate-180"
                    (click)="storeData.dispatch({ type: 'toggleSidebar'})">
                    <icon-carets-down class="m-auto rotate-90" />
                </a>
            </div>

            <ng-scrollbar class="relative !h-[calc(100vh-80px)]" appearance="compact">
                <ul class="relative space-y-0.5 p-4 py-0 font-semibold">

                    @for(menu of menuItems ; track menu) {
                    <li class="accordion menu nav-item">
                        <button type="button" class="nav-link group w-full"
                            [ngClass]="{ active: isIncludedInActive(menu.label) }"
                            (click)="menu.submenu?.length > 0 ? toggleAccordion(menu.label) : navigateTo(menu.route)">
                            <div class="flex items-center">
                                <span
                                    class="text-black dark:text-[#506690] dark:group-hover:text-white-dark ltr:pl-3 rtl:pr-3">
                                    {{ menu.label }}
                                </span>
                            </div>
                            <div [ngClass]="{ 'rtl:rotate-90 -rotate-90': !activeDropdown.includes(menu.label) }">
                                <icon-caret-down />
                            </div>
                        </button>

                        @if(menu.submenu?.length > 0) {

                        <div [@slideDownUp]="!activeDropdown.includes(menu.label)" class="accordion-content">
                            <ul class="sub-menu text-gray-500">
                                @for(sub of menu.submenu; track sub) {
                                <li>
                                    <a (click)="navigateTo(sub.route)">{{sub.label}}</a>
                                </li>
                                }
                            </ul>

                        </div>

                        }

                    </li>
                    }

                </ul>
            </ng-scrollbar>
        </div>
    </nav>
</div>
